name: UmaLab live ingest

on:
  schedule:
    # JST 12:00-22:55. Vercel Hobby Cron cannot run this often, so GitHub
    # Actions can drive near-real-time result polling when repository secrets
    # are configured.
    - cron: "*/5 3-13 * * *"
    # JST 07:00 card refresh before racing starts.
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Call UmaLab ingest endpoint
        env:
          UMALAB_CRON_SECRET: ${{ secrets.UMALAB_CRON_SECRET }}
          UMALAB_PROD_URL: ${{ secrets.UMALAB_PROD_URL }}
        run: |
          set -euo pipefail
          if [ -z "${UMALAB_CRON_SECRET:-}" ]; then
            echo "UMALAB_CRON_SECRET is not configured"
            exit 1
          fi

          base_url="${UMALAB_PROD_URL:-https://uma-lab.vercel.app}"
          hour_utc="$(date -u +%H)"
          if [ "$hour_utc" = "22" ]; then
            endpoint="/api/jobs/ingest/netkeiba?days=1&days_ahead=3&max_requests=320"
          else
            endpoint="/api/jobs/ingest/netkeiba/results?days=1&max_requests=220&backfill_finished_predictions=false"
          fi

          curl -fsS \
            -H "Authorization: Bearer ${UMALAB_CRON_SECRET}" \
            "${base_url}${endpoint}"
