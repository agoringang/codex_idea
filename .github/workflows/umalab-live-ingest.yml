name: UmaLab live ingest

on:
  schedule:
    # JST 12:00-17:55. Near-real-time result polling while races are running.
    - cron: "*/5 3-8 * * *"
    # JST 18:00-23:50. JRA next-day odds are refreshed separately and quickly.
    - cron: "*/10 9-14 * * *"
    # JST 06:00-10:50. Race-day JRA odds refresh before the first races.
    - cron: "*/10 21-23 * * *"
    - cron: "*/10 0-1 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Call UmaLab ingest endpoint
        env:
          UMALAB_CRON_SECRET: ${{ secrets.UMALAB_CRON_SECRET }}
          UMALAB_PROD_URL: ${{ secrets.UMALAB_PROD_URL }}
        run: |
          set -euo pipefail
          if [ -z "${UMALAB_CRON_SECRET:-}" ]; then
            echo "UMALAB_CRON_SECRET is not configured"
            exit 1
          fi

          base_url="${UMALAB_PROD_URL:-https://uma-lab.vercel.app}"
          hour_jst="$(TZ=Asia/Tokyo date +%H)"
          if [ "$hour_jst" -ge 18 ] || [ "$hour_jst" -le 10 ]; then
            endpoints=(
              "/api/jobs/ingest/netkeiba/jra-odds?days=1&days_ahead=1&max_requests=260&delay=0.08"
              "/api/jobs/ingest/netkeiba?days=1&days_ahead=1&max_requests=220&delay=0.10&refresh=true&prefer_results=false&market=NAR"
            )
          else
            endpoints=(
              "/api/jobs/ingest/netkeiba/results?days=1&days_ahead=1&max_requests=260&delay=0.18&backfill_finished_predictions=false&market=all"
            )
          fi

          for endpoint in "${endpoints[@]}"; do
            curl -fsS \
              -H "Authorization: Bearer ${UMALAB_CRON_SECRET}" \
              "${base_url}${endpoint}"
          done
